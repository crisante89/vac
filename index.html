<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#C026D3"/>
  <title>💅 Centro Estetico</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#FDF6FB;color:#1a1a2e;min-height:100vh;}
    #root{max-width:560px;margin:0 auto;}
    button,input,select,textarea{font-family:inherit;}
    input[type=date],input[type=time],input[type=number]{-webkit-appearance:none;}
    @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite;display:inline-block;}
  </style>
</head>
<body>
<div id="root"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { createElement as h, useState, useEffect, useRef, useCallback } from "https://esm.sh/react@18";
import { createRoot } from "https://esm.sh/react-dom@18/client";

// ─────────────────────────────────────────────────────────────────────────────
// ⚙️  INSERISCI QUI LA TUA CONFIGURAZIONE FIREBASE
// ─────────────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBfeYVWFOdguhNogaiAxBJk5vVe_vGAM1k",
  authDomain:        "centro-estetico-690e8.firebaseapp.com",
  databaseURL:       "https://centro-estetico-690e8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "centro-estetico-690e8",
  storageBucket:     "centro-estetico-690e8.firebasestorage.app",
  messagingSenderId: "440048809910",
  appId:             "1:440048809910:web:2da5a3ae29354aadde3317"
};
// ─────────────────────────────────────────────────────────────────────────────

const NOT_CONFIGURED = FIREBASE_CONFIG.apiKey === "INSERISCI_API_KEY";

// ── Helpers ──────────────────────────────────────────────────────────────────
const DEFAULT_SERVICES = [
  {id:"s1",name:"Manicure",     duration:60,price:25,color:"#F472B6"},
  {id:"s2",name:"Pedicure",     duration:75,price:35,color:"#C084FC"},
  {id:"s3",name:"Ceretta",      duration:45,price:30,color:"#FB923C"},
  {id:"s4",name:"Pulizia viso", duration:90,price:55,color:"#34D399"},
  {id:"s5",name:"Sopracciglia", duration:20,price:15,color:"#60A5FA"},
  {id:"s6",name:"Massaggio",    duration:60,price:50,color:"#FBBF24"},
];
const SVC_COLORS=["#F472B6","#C084FC","#FB923C","#34D399","#60A5FA","#FBBF24","#F87171","#818CF8"];
const MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

function fmt(d){const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`;}
function todayStr(){return new Date().toISOString().split("T")[0];}
function tomorrowStr(){const t=new Date();t.setDate(t.getDate()+1);return t.toISOString().split("T")[0];}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDow(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function waLink(phone,name,date,time,svc){
  const n=phone.replace(/\D/g,"");
  const num=n.startsWith("39")?n:n.startsWith("0")?"39"+n.slice(1):"39"+n;
  const msg=encodeURIComponent(`Ciao ${name}! 💆‍♀️ Ti ricordiamo il tuo appuntamento per *${svc}* domani *${fmt(date)}* alle ore *${time}*.\nA presto! ✨`);
  return`https://wa.me/${num}?text=${msg}`;
}

// ── Styles ───────────────────────────────────────────────────────────────────
const S={
  lbl:{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:4},
  inp:{width:"100%",padding:"10px 12px",border:"1.5px solid #E5E7EB",borderRadius:10,
       fontSize:14,marginBottom:12,boxSizing:"border-box",background:"#FAFAFA",outline:"none"},
  btnP:{border:"none",borderRadius:12,background:"linear-gradient(135deg,#C026D3,#7C3AED)",
        color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,padding:"10px 18px"},
  btnG:{border:"1px solid #E5E7EB",borderRadius:12,background:"#fff",
        cursor:"pointer",fontWeight:600,fontSize:14,padding:"10px 18px"},
};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  // Firebase instance
  const dbRef   = useRef(null);
  const salonRef= useRef(null);

  // Setup
  const [salonCode,setSalonCode]=useState(()=>localStorage.getItem("ce_code")||"");
  const [codeInput,setCodeInput]=useState("");
  const [setupStep,setSetupStep]=useState(!localStorage.getItem("ce_code"));
  const [fbReady,setFbReady]=useState(false);
  const [fbError,setFbError]=useState("");

  // Data
  const [clients,setClients]=useState([]);
  const [appointments,setAppointments]=useState([]);
  const [services,setServices]=useState(DEFAULT_SERVICES);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);

  // UI
  const [tab,setTab]=useState("agenda");
  const [modal,setModal]=useState(null);
  const [calDate,setCalDate]=useState(()=>{const n=new Date();return{year:n.getFullYear(),month:n.getMonth()};});
  const [selDay,setSelDay]=useState(todayStr);
  const [toast,setToast]=useState(null);
  const [editId,setEditId]=useState(null);
  const [apptForm,setApptForm]=useState({clientId:"",serviceId:"",date:"",time:"09:00",note:""});
  const [clientForm,setClientForm]=useState({name:"",phone:"",email:"",note:""});
  const [svcForm,setSvcForm]=useState({name:"",duration:60,price:0,color:"#F472B6"});

  const pushing=useRef(false);

  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),3000);}

  // ── Init Firebase ──────────────────────────────────────────────────────────
  useEffect(()=>{
    if(NOT_CONFIGURED||!salonCode)return;
    try{
      const app=initializeApp(FIREBASE_CONFIG,salonCode);
      const db=getDatabase(app);
      dbRef.current=db;
      salonRef.current=ref(db,`salons/${salonCode}`);

      // Live listener
      const unsub=onValue(salonRef.current,(snap)=>{
        if(pushing.current)return;
        const d=snap.val();
        if(!d)return;
        if(d.clients)     setClients(Object.values(d.clients));
        if(d.appointments)setAppointments(Object.values(d.appointments));
        if(d.services)    setServices(Object.values(d.services));
        setLastSync(new Date());
        setSyncing(false);
      },(err)=>{setFbError(err.message);});

      setFbReady(true);
      return()=>unsub();
    }catch(e){setFbError(e.message);}
  },[salonCode]);

  // ── Push to Firebase ───────────────────────────────────────────────────────
  async function push(cl,ap,sv){
    if(!salonRef.current)return;
    pushing.current=true;
    setSyncing(true);
    try{
      const toObj=arr=>arr.reduce((o,x)=>{o[x.id]=x;return o;},{});
      await set(salonRef.current,{
        clients:toObj(cl),
        appointments:toObj(ap),
        services:toObj(sv),
        updatedAt:Date.now()
      });
      setLastSync(new Date());
    }catch(e){showToast("Errore salvataggio","err");}
    setSyncing(false);
    setTimeout(()=>{pushing.current=false;},1500);
  }

  function mutate({cl=clients,ap=appointments,sv=services}){
    setClients(cl);setAppointments(ap);setServices(sv);
    push(cl,ap,sv);
  }

  // ── Handlers ──────────────────────────────────────────────────────────────
  function enterCode(code){
    const c=code.trim().toUpperCase().replace(/\s/g,"");
    if(!c){showToast("Inserisci un codice","err");return;}
    localStorage.setItem("ce_code",c);
    setSalonCode(c);setSetupStep(false);
  }
  function genCode(){setCodeInput(Math.random().toString(36).slice(2,8).toUpperCase());}

  function openAppt(data={}){setApptForm(data.appt||{clientId:"",serviceId:"",date:selDay,time:"09:00",note:""});setEditId(data.id||null);setModal("appt");}
  function openClient(data={}){setClientForm(data.client||{name:"",phone:"",email:"",note:""});setEditId(data.id||null);setModal("client");}
  function openSvc(data={}){setSvcForm(data.svc||{name:"",duration:60,price:0,color:"#F472B6"});setEditId(data.id||null);setModal("svc");}

  function saveAppt(){
    if(!apptForm.clientId||!apptForm.serviceId||!apptForm.date||!apptForm.time){showToast("Compila tutti i campi","err");return;}
    const ap=editId?appointments.map(a=>a.id===editId?{...apptForm,id:editId,status:a.status}:a):[...appointments,{...apptForm,id:uid(),status:"confermato"}];
    mutate({ap});showToast(editId?"Aggiornato ✓":"Salvato ✓");setModal(null);
  }
  function saveClient(){
    if(!clientForm.name){showToast("Inserisci il nome","err");return;}
    const cl=editId?clients.map(c=>c.id===editId?{...clientForm,id:editId}:c):[...clients,{...clientForm,id:uid()}];
    mutate({cl});showToast(editId?"Cliente aggiornato ✓":"Cliente aggiunto ✓");setModal(null);
  }
  function saveSvc(){
    if(!svcForm.name){showToast("Inserisci il nome","err");return;}
    const sv=editId?services.map(s=>s.id===editId?{...svcForm,id:editId}:s):[...services,{...svcForm,id:uid()}];
    mutate({sv});showToast("Servizio salvato ✓");setModal(null);
  }
  function delAppt(id){if(confirm("Eliminare?"))mutate({ap:appointments.filter(a=>a.id!==id)});}
  function delClient(id){if(confirm("Eliminare?"))mutate({cl:clients.filter(c=>c.id!==id)});}
  function delSvc(id){if(confirm("Eliminare?"))mutate({sv:services.filter(s=>s.id!==id)});}
  function toggleAppt(id){mutate({ap:appointments.map(a=>a.id===id?{...a,status:a.status==="completato"?"confermato":"completato"}:a)});}

  const getClient=id=>clients.find(c=>c.id===id);
  const getSvc=id=>services.find(s=>s.id===id);

  const{year,month}=calDate;
  const today=todayStr(),tomorrow=tomorrowStr();
  const dayAppts=appointments.filter(a=>a.date===selDay).sort((a,b)=>a.time.localeCompare(b.time));
  const tmrAppts=appointments.filter(a=>a.date===tomorrow&&a.status!=="cancellato");
  function apptCount(d){const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;return appointments.filter(a=>a.date===ds&&a.status!=="cancellato").length;}
  function pickDay(d){setSelDay(`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);}

  // ── Setup screen ──────────────────────────────────────────────────────────
  if(setupStep) return h("div",{style:{minHeight:"100vh",background:"linear-gradient(135deg,#F3E8FF,#FDF6FB)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h("div",{style:{background:"#fff",borderRadius:24,padding:28,maxWidth:380,width:"100%",boxShadow:"0 8px 40px rgba(192,38,211,0.15)"}},
      h("div",{style:{textAlign:"center",marginBottom:20}},
        h("div",{style:{fontSize:52}},"💅"),
        h("div",{style:{fontWeight:800,fontSize:22,marginTop:8}},"Centro Estetico"),
        h("div",{style:{color:"#6B7280",fontSize:14,marginTop:4}},"Gestionale multi-dispositivo")
      ),
      NOT_CONFIGURED&&h("div",{style:{background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:12,padding:14,marginBottom:16,fontSize:13,color:"#92400E",lineHeight:1.6}},
        h("b",null,"⚙️ Configura Firebase prima di usare l'app."),
        h("br"),h("br"),
        "Apri il file ",h("code",null,"index.html"),", trova la sezione ",h("code",null,"FIREBASE_CONFIG")," e sostituisci i valori con quelli del tuo progetto Firebase.",
        h("br"),h("br"),
        "Segui le istruzioni nel file ",h("code",null,"SETUP.md")," incluso."
      ),
      h("div",{style:{background:"#F3E8FF",borderRadius:14,padding:14,marginBottom:18,fontSize:13,color:"#6B26A0",lineHeight:1.6}},
        h("b",null,"🔑 Codice Salone:"), " tutti i dispositivi con lo stesso codice condividono i dati in tempo reale.",
        h("br"),h("br"),
        "Prima volta? ", h("b",null,"Genera"), " un codice e condividilo con le colleghe."
      ),
      h("label",{style:S.lbl},"Codice Salone"),
      h("div",{style:{display:"flex",gap:8,marginBottom:14}},
        h("input",{value:codeInput,onChange:e=>setCodeInput(e.target.value.toUpperCase()),
          style:{...S.inp,marginBottom:0,flex:1,fontFamily:"monospace",fontSize:20,letterSpacing:4,textAlign:"center",fontWeight:700},
          placeholder:"ES: ABC123",maxLength:10}),
        h("button",{onClick:genCode,style:{...S.btnG,padding:"10px 12px",flexShrink:0,fontSize:12}},"🎲 Genera")
      ),
      h("button",{onClick:()=>enterCode(codeInput),style:{...S.btnP,width:"100%",padding:14,fontSize:16,borderRadius:14}},"Accedi →"),
      h("div",{style:{textAlign:"center",marginTop:14,color:"#9CA3AF",fontSize:12}},"Dati sincronizzati via Firebase")
    )
  );

  // ── Main app ──────────────────────────────────────────────────────────────
  return h("div",{style:{fontFamily:"'Segoe UI',system-ui,sans-serif",minHeight:"100vh",background:"#FDF6FB",color:"#1a1a2e"}},

    // Header
    h("div",{style:{background:"linear-gradient(135deg,#C026D3,#7C3AED)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 12px rgba(192,38,211,0.3)"}},
      h("div",null,
        h("div",{style:{color:"#fff",fontWeight:800,fontSize:18}},"💅 Centro Estetico"),
        h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:2}},
          syncing?h("span",{className:"spin",style:{fontSize:12}},"⟳"):h("div",{style:{width:7,height:7,borderRadius:"50%",background:fbError?"#FCA5A5":fbReady?"#6EE7B7":"#FDE68A"}}),
          h("span",{style:{color:"rgba(255,255,255,0.75)",fontSize:11}},
            fbError?"Errore Firebase":syncing?"Sincronizzazione…":lastSync?`Sync ${lastSync.toLocaleTimeString("it",{hour:"2-digit",minute:"2-digit"})}`:"In attesa…"
          )
        )
      ),
      h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        tmrAppts.length>0&&h("div",{style:{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"3px 10px",color:"#fff",fontSize:12,fontWeight:600}},`🔔 ${tmrAppts.length} domani`),
        h("button",{onClick:()=>{localStorage.removeItem("ce_code");setSalonCode("");setSetupStep(true);},
          style:{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"5px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontWeight:600}},
          `🔑 ${salonCode}`)
      )
    ),

    // Tabs
    h("div",{style:{display:"flex",background:"#fff",borderBottom:"1px solid #F3E8FF",overflowX:"auto"}},
      [{id:"agenda",l:"📅 Agenda"},{id:"reminder",l:"🔔 Promemoria"},{id:"clients",l:"👥 Clienti"},{id:"services",l:"✂️ Servizi"}].map(t=>
        h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:"none",padding:"11px 16px",border:"none",background:"transparent",fontWeight:tab===t.id?700:400,fontSize:13,color:tab===t.id?"#C026D3":"#6B7280",borderBottom:tab===t.id?"2.5px solid #C026D3":"2.5px solid transparent",cursor:"pointer",whiteSpace:"nowrap"}},t.l)
      )
    ),

    // Toast
    toast&&h("div",{style:{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:toast.type==="err"?"#EF4444":"#10B981",color:"#fff",borderRadius:12,padding:"10px 20px",fontSize:14,fontWeight:600,zIndex:1000,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",animation:"slideDown .3s ease"}},toast.msg),

    // ── AGENDA ──
    tab==="agenda"&&h("div",{style:{padding:16}},
      // Calendar
      h("div",{style:{background:"#fff",borderRadius:16,padding:14,marginBottom:14,boxShadow:"0 2px 12px rgba(192,38,211,0.07)"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
          h("button",{onClick:()=>setCalDate(p=>{const d=new Date(p.year,p.month-1);return{year:d.getFullYear(),month:d.getMonth()};}),style:{background:"#F3E8FF",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:18,color:"#7C3AED"}},"‹"),
          h("span",{style:{fontWeight:700,fontSize:14}},`${MONTHS[month]} ${year}`),
          h("button",{onClick:()=>setCalDate(p=>{const d=new Date(p.year,p.month+1);return{year:d.getFullYear(),month:d.getMonth()};}),style:{background:"#F3E8FF",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:18,color:"#7C3AED"}},"›")
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,textAlign:"center"}},
          ["Lu","Ma","Me","Gi","Ve","Sa","Do"].map(d=>h("div",{key:d,style:{fontSize:10,fontWeight:700,color:"#9CA3AF",padding:"3px 0"}},d)),
          Array(firstDow(year,month)).fill(null).map((_,i)=>h("div",{key:"e"+i})),
          Array(daysInMonth(year,month)).fill(null).map((_,i)=>{
            const d=i+1,ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const cnt=apptCount(d),isSel=ds===selDay,isToday=ds===today;
            return h("button",{key:d,onClick:()=>pickDay(d),style:{border:"none",borderRadius:9,padding:"5px 2px",cursor:"pointer",background:isSel?"linear-gradient(135deg,#C026D3,#7C3AED)":isToday?"#F3E8FF":"transparent",color:isSel?"#fff":isToday?"#7C3AED":"#374151",fontWeight:isSel||isToday?700:400,fontSize:12}},
              d,cnt>0&&h("span",{style:{display:"block",width:5,height:5,borderRadius:"50%",background:isSel?"#fff":"#C026D3",margin:"2px auto 0"}})
            );
          })
        )
      ),
      // Day header
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        h("div",{style:{fontWeight:700,fontSize:15}},fmt(selDay)),
        h("button",{onClick:()=>openAppt(),style:S.btnP},"+ Appuntamento")
      ),
      dayAppts.length===0
        ?h("div",{style:{textAlign:"center",padding:32,color:"#9CA3AF"}},h("div",{style:{fontSize:40,marginBottom:6}},"📭"),h("div",{style:{fontSize:14}},"Nessun appuntamento"))
        :h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
          dayAppts.map(a=>{
            const cl=getClient(a.clientId),sv=getSvc(a.serviceId);
            return h("div",{key:a.id,style:{background:"#fff",borderRadius:14,padding:14,borderLeft:`4px solid ${sv?.color||"#C026D3"}`,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",opacity:a.status==="completato"?0.65:1}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                h("div",null,
                  h("div",{style:{fontWeight:700,fontSize:15}},`⏰ ${a.time} — ${cl?.name||"?"}`),
                  h("div",{style:{color:"#7C3AED",fontSize:13,marginTop:2}},`${sv?.name} · ${sv?.duration}min · €${sv?.price}`),
                  a.note&&h("div",{style:{color:"#6B7280",fontSize:12,marginTop:3}},`📝 ${a.note}`),
                  cl?.phone&&h("a",{href:waLink(cl.phone,cl.name,a.date,a.time,sv?.name),target:"_blank",rel:"noreferrer",style:{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:"#DCF8C6",color:"#128C7E",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,textDecoration:"none"}},"💬 WhatsApp")
                ),
                h("div",{style:{display:"flex",gap:5,flexShrink:0,marginLeft:8}},
                  h("button",{onClick:()=>toggleAppt(a.id),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:a.status==="completato"?"#D1FAE5":"#F3F4F6",fontSize:15}},a.status==="completato"?"✅":"⭕"),
                  h("button",{onClick:()=>openAppt({appt:a,id:a.id}),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#F3E8FF",fontSize:14}},"✏️"),
                  h("button",{onClick:()=>delAppt(a.id),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#FEE2E2",fontSize:14}},"🗑️")
                )
              )
            );
          })
        )
    ),

    // ── REMINDER ──
    tab==="reminder"&&h("div",{style:{padding:16}},
      h("div",{style:{background:"linear-gradient(135deg,#F3E8FF,#FDF6FB)",borderRadius:16,padding:14,marginBottom:14,border:"1px solid #E9D5FF"}},
        h("div",{style:{fontWeight:700,fontSize:15}},"🔔 Promemoria di domani"),
        h("div",{style:{color:"#6B7280",fontSize:13,marginTop:2}},`${fmt(tomorrow)} · ${tmrAppts.length} appuntament${tmrAppts.length===1?"o":"i"}`)
      ),
      tmrAppts.length===0
        ?h("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF"}},h("div",{style:{fontSize:48,marginBottom:8}},"😌"),h("div",{style:{fontWeight:600}},"Nessun appuntamento domani"))
        :h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          h("div",{style:{background:"#FEF3C7",borderRadius:12,padding:"10px 14px",fontSize:13,color:"#92400E",display:"flex",gap:8}},
            "💡 Tocca il pulsante verde per aprire WhatsApp col messaggio già scritto."
          ),
          tmrAppts.map(a=>{
            const cl=getClient(a.clientId),sv=getSvc(a.serviceId);
            return h("div",{key:a.id,style:{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",borderLeft:`4px solid ${sv?.color||"#C026D3"}`}},
              h("div",{style:{fontWeight:700,fontSize:15}},cl?.name||"?"),
              h("div",{style:{color:"#7C3AED",fontSize:13,marginTop:2}},`${sv?.name} · ${a.time}`),
              cl?.phone&&h("div",{style:{color:"#6B7280",fontSize:12,marginTop:2}},`📱 ${cl.phone}`),
              h("div",{style:{marginTop:10}},
                cl?.phone
                  ?h("a",{href:waLink(cl.phone,cl.name,a.date,a.time,sv?.name),target:"_blank",rel:"noreferrer",style:{display:"inline-flex",alignItems:"center",gap:6,background:"#25D366",color:"#fff",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,textDecoration:"none"}},"💬 Invia WhatsApp")
                  :h("span",{style:{color:"#EF4444",fontSize:13}},"⚠️ Numero mancante nel profilo cliente")
              ),
              h("div",{style:{marginTop:8,background:"#F9FAFB",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#4B5563",fontStyle:"italic"}},
                `Ciao ${cl?.name}! 💆‍♀️ Ti ricordiamo il tuo appuntamento per `,h("b",null,sv?.name),` domani ${fmt(a.date)} alle ore ${a.time}. A presto! ✨`
              )
            );
          })
        )
    ),

    // ── CLIENTS ──
    tab==="clients"&&h("div",{style:{padding:16}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("div",{style:{fontWeight:700,fontSize:16}},`👥 Clienti (${clients.length})`),
        h("button",{onClick:()=>openClient(),style:S.btnP},"+ Cliente")
      ),
      clients.length===0
        ?h("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF"}},h("div",{style:{fontSize:48}},"👤"),h("div",{style:{marginTop:8}},"Nessun cliente ancora"))
        :h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
          clients.map(c=>{
            const cnt=appointments.filter(a=>a.clientId===c.id).length;
            return h("div",{key:c.id,style:{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                h("div",{style:{display:"flex",gap:12,alignItems:"center"}},
                  h("div",{style:{width:42,height:42,borderRadius:"50%",background:"linear-gradient(135deg,#C026D3,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:17,flexShrink:0}},c.name.charAt(0).toUpperCase()),
                  h("div",null,
                    h("div",{style:{fontWeight:700,fontSize:15}},c.name),
                    c.phone&&h("div",{style:{color:"#6B7280",fontSize:13}},`📱 ${c.phone}`),
                    c.email&&h("div",{style:{color:"#6B7280",fontSize:13}},`✉️ ${c.email}`),
                    h("div",{style:{color:"#9CA3AF",fontSize:12,marginTop:2}},`${cnt} appuntament${cnt===1?"o":"i"}`)
                  )
                ),
                h("div",{style:{display:"flex",gap:5,flexShrink:0,marginLeft:8}},
                  c.phone&&h("a",{href:`https://wa.me/${c.phone.replace(/\D/g,"")}`,target:"_blank",rel:"noreferrer",style:{width:30,height:30,borderRadius:8,background:"#DCF8C6",display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none",fontSize:16}},"💬"),
                  h("button",{onClick:()=>openClient({client:c,id:c.id}),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#F3E8FF",fontSize:14}},"✏️"),
                  h("button",{onClick:()=>delClient(c.id),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#FEE2E2",fontSize:14}},"🗑️")
                )
              ),
              c.note&&h("div",{style:{marginTop:8,color:"#6B7280",fontSize:13,background:"#F9FAFB",borderRadius:8,padding:"6px 10px"}},`📝 ${c.note}`)
            );
          })
        )
    ),

    // ── SERVICES ──
    tab==="services"&&h("div",{style:{padding:16}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("div",{style:{fontWeight:700,fontSize:16}},`✂️ Servizi (${services.length})`),
        h("button",{onClick:()=>openSvc(),style:S.btnP},"+ Servizio")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        services.map(s=>h("div",{key:s.id,style:{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",borderLeft:`4px solid ${s.color}`}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null,h("div",{style:{fontWeight:700,fontSize:15}},s.name),h("div",{style:{color:"#6B7280",fontSize:13,marginTop:2}},`⏱ ${s.duration} min · 💶 €${s.price}`)),
            h("div",{style:{display:"flex",gap:5}},
              h("button",{onClick:()=>openSvc({svc:s,id:s.id}),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#F3E8FF",fontSize:14}},"✏️"),
              h("button",{onClick:()=>delSvc(s.id),style:{width:30,height:30,borderRadius:8,border:"none",cursor:"pointer",background:"#FEE2E2",fontSize:14}},"🗑️")
            )
          )
        ))
      )
    ),

    // ── MODALS ──
    modal&&h("div",{onClick:()=>setModal(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}},
      h("div",{onClick:e=>e.stopPropagation(),style:{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"85vh",overflowY:"auto",padding:20}},

        modal==="appt"&&h(null,null,
          h("div",{style:{fontWeight:800,fontSize:17,marginBottom:16}},`${editId?"✏️ Modifica":"➕ Nuovo"} Appuntamento`),
          h("label",{style:S.lbl},"Cliente *"),
          h("select",{value:apptForm.clientId,onChange:e=>setApptForm(p=>({...p,clientId:e.target.value})),style:S.inp},
            h("option",{value:""},"— Seleziona cliente —"),
            clients.map(c=>h("option",{key:c.id,value:c.id},c.name))
          ),
          clients.length===0&&h("div",{style:{color:"#EF4444",fontSize:12,marginBottom:8}},"Aggiungi prima un cliente"),
          h("label",{style:S.lbl},"Servizio *"),
          h("select",{value:apptForm.serviceId,onChange:e=>setApptForm(p=>({...p,serviceId:e.target.value})),style:S.inp},
            h("option",{value:""},"— Seleziona servizio —"),
            services.map(s=>h("option",{key:s.id,value:s.id},`${s.name} · €${s.price}`))
          ),
          h("label",{style:S.lbl},"Data *"),
          h("input",{type:"date",value:apptForm.date,onChange:e=>setApptForm(p=>({...p,date:e.target.value})),style:S.inp}),
          h("label",{style:S.lbl},"Ora *"),
          h("input",{type:"time",value:apptForm.time,onChange:e=>setApptForm(p=>({...p,time:e.target.value})),style:S.inp}),
          h("label",{style:S.lbl},"Note"),
          h("textarea",{value:apptForm.note,onChange:e=>setApptForm(p=>({...p,note:e.target.value})),style:{...S.inp,height:60,resize:"vertical"},placeholder:"Note opzionali…"}),
          h("div",{style:{display:"flex",gap:10,marginTop:4}},
            h("button",{onClick:()=>setModal(null),style:{...S.btnG,flex:1}},"Annulla"),
            h("button",{onClick:saveAppt,style:{...S.btnP,flex:2,padding:14,fontSize:15}},"Salva")
          )
        ),

        modal==="client"&&h(null,null,
          h("div",{style:{fontWeight:800,fontSize:17,marginBottom:16}},`${editId?"✏️ Modifica":"➕ Nuovo"} Cliente`),
          h("label",{style:S.lbl},"Nome *"),
          h("input",{value:clientForm.name,onChange:e=>setClientForm(p=>({...p,name:e.target.value})),style:S.inp,placeholder:"Nome e cognome"}),
          h("label",{style:S.lbl},"Telefono (per WhatsApp)"),
          h("input",{value:clientForm.phone,onChange:e=>setClientForm(p=>({...p,phone:e.target.value})),style:S.inp,placeholder:"+39 333 123 4567",type:"tel"}),
          h("label",{style:S.lbl},"Email"),
          h("input",{value:clientForm.email,onChange:e=>setClientForm(p=>({...p,email:e.target.value})),style:S.inp,placeholder:"email@esempio.it",type:"email"}),
          h("label",{style:S.lbl},"Note"),
          h("textarea",{value:clientForm.note,onChange:e=>setClientForm(p=>({...p,note:e.target.value})),style:{...S.inp,height:60,resize:"vertical"},placeholder:"Allergie, preferenze…"}),
          h("div",{style:{display:"flex",gap:10,marginTop:4}},
            h("button",{onClick:()=>setModal(null),style:{...S.btnG,flex:1}},"Annulla"),
            h("button",{onClick:saveClient,style:{...S.btnP,flex:2,padding:14,fontSize:15}},"Salva")
          )
        ),

        modal==="svc"&&h(null,null,
          h("div",{style:{fontWeight:800,fontSize:17,marginBottom:16}},`${editId?"✏️ Modifica":"➕ Nuovo"} Servizio`),
          h("label",{style:S.lbl},"Nome *"),
          h("input",{value:svcForm.name,onChange:e=>setSvcForm(p=>({...p,name:e.target.value})),style:S.inp,placeholder:"Es. Manicure"}),
          h("label",{style:S.lbl},"Durata (minuti)"),
          h("input",{type:"number",value:svcForm.duration,onChange:e=>setSvcForm(p=>({...p,duration:parseInt(e.target.value)||0})),style:S.inp,min:"5",step:"5"}),
          h("label",{style:S.lbl},"Prezzo (€)"),
          h("input",{type:"number",value:svcForm.price,onChange:e=>setSvcForm(p=>({...p,price:parseFloat(e.target.value)||0})),style:S.inp,min:"0",step:"0.5"}),
          h("label",{style:S.lbl},"Colore"),
          h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}},
            SVC_COLORS.map(c=>h("button",{key:c,onClick:()=>setSvcForm(p=>({...p,color:c})),style:{width:36,height:36,borderRadius:"50%",background:c,border:svcForm.color===c?"3px solid #1a1a2e":"3px solid transparent",cursor:"pointer"}}))
          ),
          h("div",{style:{display:"flex",gap:10}},
            h("button",{onClick:()=>setModal(null),style:{...S.btnG,flex:1}},"Annulla"),
            h("button",{onClick:saveSvc,style:{...S.btnP,flex:2,padding:14,fontSize:15}},"Salva")
          )
        )
      )
    )
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
